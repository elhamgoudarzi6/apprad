<section id="faq" class="faq mt-5 mb-5 container wow fadeInUp">
    <div class="row align-items-center justify-content-center">
        <div class="col-lg-3 baner align-items-center">
            <i class="pi pi-question"></i>
        </div>
        <div class="col-lg-9">
            <h1 class="text-center mb-4">سوالات متداول</h1>
            <p-accordion iconPos="left" collapseIcon="pi pi-angle-down" expandIcon="pi pi-angle-left">
                <p-accordionTab *ngFor="let item of faqs">
                    <ng-template pTemplate="header">
                        {{item.question}}
                    </ng-template>
                    {{item.reply}}
                </p-accordionTab>
            </p-accordion>
        </div>
    </div>
</section>
